{% extends "commits/layout.html" %}

{% block head %} {{ super() }}
<!-- CSS -->
<link
  rel="stylesheet"
  type="text/css"
  href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css"
/>
<!-- Javascripts -->
<script
  type="text/javascript"
  src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"
></script>


{% endblock %}


{% block subcontent %}
  <div class="border border-primary rounded mt-3">
    <div class="bg-primary p-2">
      <strong> {{result.commit.message.split("\n")[0]}} </strong>
    </div>
    <div class="p-2">
      <div>
        <pre>
          {{"\n".join(result.commit.message.split("\n")[1:])}}
        </pre>
      </div>
    </div>
    <div class="border-top border-primary">
      <div class="m-2 text-muted" title="commit SHA">{{result.commit.SHA}}</div>
    </div>
  </div>
  <div class="mt-3">
    <div id="destination-elem-id"></div>
  </div>
</div>
<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", () => {
    var diffHtml = Diff2Html.html({{result.commit.diff|tojson}}, {
      drawFileList: true,
      matching: "words",
      outputFormat: "side-by-side",
    });
    document.getElementById("destination-elem-id").innerHTML = diffHtml;
  });
</script>
{% endblock %}
